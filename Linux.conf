# ---------- 系统基础 ----------
SUPPORTED_VERSIONS="8,9,10"          # 支持的 RockyLinux 大版本
SUPPORTED_VERSIONS=""
LOG_FILE="/var/log/ALL.log"
LOG_LEVEL="INFO"                     # DEBUG, INFO, WARNING, ERROR

BACKUP_DIR="/backup"
AUTO_BACKUP="true"
FORCE_BACKUP="false"

# ---------- HTTP 服务 ----------
# Apache (httpd)
HTTP_VERSION="2.4.57"                # 默认安装版本
HTTP_VERSIONS="2.2.34,2.4.6,2.4.10,2.4.25,2.4.33,2.4.37,2.4.41,2.4.46,2.4.51,2.4.54,2.4.57,2.4.58,2.4.59,2.4.60,2.4.61"

# Nginx (修正原拼写错误)
NGINX_VERSION="1.24"                 # 默认安装版本
NGINX_VERSIONS="1.20.0,1.20.2,1.22.0,1.22.1,1.24.0,1.24.1,1.26.0,1.28.0"
#编辑 Nginx 仓库配置文件配置NGINX
sudo vi /etc/yum.repos.d/nginx.repo
#替换为正确的稳定版配置
cat <<EOF > /etc/yum.repos.d/nginx.repo
[nginx-stable]
name=nginx stable repo
baseurl=https://nginx.org/packages/centos/$releasever/$basearch/
gpgcheck=1
enabled=1
gpgkey=https://nginx.org/keys/nginx_signing.key
module_hotfixes=true

[nginx-mainline]
name=nginx mainline repo
baseurl=https://nginx.org/packages/mainline/centos/$releasever/$basearch/
gpgcheck=1
enabled=0
gpgkey=https://nginx.org/keys/nginx_signing.key
module_hotfixes=true
EOF
#清理 YUM 缓存并重新安装 Nginx
module_hotfixes=true
sudo yum clean all
sudo yum makecache
sudo yum install -y nginx
#验证安装-检查 Nginx 版本
echo "#Nginx 版本:"
sudo nginx -v
#使用 Nginx 主线版（包含最新功能）
sudo yum-config-manager --enable nginx-mainline
sudo yum install -y nginx
#验证安装-检查 Nginx 版本
echo "#Nginx 版本:"
sudo nginx -v
#使用 Nginx 主线版（包含最新功能）
sudo yum-config-manager --enable nginx-mainline
sudo yum install -y nginx
#验证安装-检查 Nginx 版本
echo "#Nginx 版本:"
sudo nginx -v
#使用 Nginx 主线版（包含最新功能）
sudo yum-config-manager --enable nginx-mainline
sudo yum install -y nginx
#使用 CentOS 官方 AppStream 仓库（最稳定）
sudo yum install -y epel-release
sudo yum install -y nginx
#手动下载 RPM 包安装 下载最新稳定版RPM包（截至2026年5月为1.26.1）
wget https://nginx.org/packages/centos/9/x86_64/RPMS/nginx-1.26.1-1.el9.ngx.x86_64.rpm
sudo rpm -ivh nginx-1.26.1-1.el9.ngx.x86_64.rpm
#启动并设置开机自启
sudo systemctl enable --now nginx
sudo systemctl status nginx




