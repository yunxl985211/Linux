# HFish 蜜罐版本
HFISH_VERSION="3.3.5"
HFISH_VERSIONS="3.1.0,3.2.0,3.3.5,3.6.0"
#离线安装HFish3.3.5
sha256sum hfish-v3.5.5-linux-amd64.tar.gz
# 对比输出的哈希值与sha256sum.txt中的值是否一致
#解压安装包
cp -p /root/LinuxEnvConfig/hfish-3.3.5-linux-amd64.tar.gz /root/
# 进入root目录
cd /root/
mkdir -p /opt/hfish/
# 解压离线包（替换为实际文件名）
tar -zxvf hfish-3.3.5-linux-amd64.tar.gz -C /opt/hfish/
# 进入解压后的目录
cd /opt/hfish/
# 赋予安装脚本执行权限
chmod -R 777 install.sh
# 执行离线安装
./install.sh install
# 查看HFish服务状态
systemctl status hfish
# CentOS/OpenCloudOS系统
firewall-cmd --add-port=4433/tcp --permanent  # 管理后台端口
firewall-cmd --reload
# Ubuntu/Debian系统
ufw allow 4433/tcp
ufw reload
cat /opt/hfish/conf/app.ini | grep password
# 示例：放行SSH(22)、HTTP(80)、MySQL(3306)端口
firewall-cmd --add-port=22/tcp --permanent
firewall-cmd --add-port=80/tcp --permanent
firewall-cmd --add-port=3306/tcp --permanent
firewall-cmd --reload
# 重置管理员密码为默认值HFish2023
cd /opt/hfish
./hfish reset password
# 启动服务
systemctl start hfish
# 停止服务
systemctl stop hfish
# 重启服务
systemctl restart hfish
# 查看服务日志
journalctl -u hfish -f
# 备份数据
cp -r /opt/hfish/data /root/hfish-backup-20260515
chmod +x upgrade.sh
./upgrade.sh
#在线HIFISH3.3.5
# 查看系统版本
cat /etc/os-release
# 查看CPU核心数
nproc
# 查看内存大小
free -h
# 查看磁盘空间
df -h
# 检查系统架构（必须是amd64）
uname -m
# 更新系统
yum update -y
# 安装基础依赖
yum install -y curl wget tar gzip net-tools telnet iptables-services
# 更新系统
apt update -y && apt upgrade -y
# 安装基础依赖
apt install -y curl wget tar gzip net-tools telnet iptables
# 关闭并禁用防火墙（后续会重新配置）
systemctl stop firewalld
systemctl disable firewalld
# 关闭SELinux（CentOS/RHEL系统）
setenforce 0
sed -i 's/^SELINUX=enforcing$/SELINUX=disabled/' /etc/selinux/config
# 检查是否有占用4433/4434端口的进程
netstat -tulpn | grep -E '4433|4434'
# 如果有，使用kill命令杀死进程
# kill -9 进程ID
# 启动并启用firewalld
systemctl start firewalld
systemctl enable firewalld
# 开放核心端口
firewall-cmd --add-port=4433/tcp --permanent
firewall-cmd --add-port=4434/tcp --permanent
firewall-cmd --add-port=4435/tcp --permanent
# 开放常用蜜罐服务端口（根据需要添加）
firewall-cmd --add-port=22/tcp --permanent    # SSH蜜罐
firewall-cmd --add-port=21/tcp --permanent    # FTP蜜罐
firewall-cmd --add-port=3306/tcp --permanent  # MySQL蜜罐
firewall-cmd --add-port=6379/tcp --permanent  # Redis蜜罐
firewall-cmd --add-port=80/tcp --permanent    # HTTP蜜罐
firewall-cmd --add-port=443/tcp --permanent   # HTTPS蜜罐
firewall-cmd --add-port=3389/tcp --permanent  # RDP蜜罐
firewall-cmd --add-port=5900/tcp --permanent  # VNC蜜罐
# 重载防火墙
firewall-cmd --reload
# 验证所有开放端口
firewall-cmd --list-ports
# 启用ufw
ufw enable
# 开放核心端口
ufw allow 4433/tcp
ufw allow 4434/tcp
ufw allow 4435/tcp
# 开放常用蜜罐服务端口
ufw allow 22/tcp
ufw allow 21/tcp
ufw allow 3306/tcp
ufw allow 6379/tcp
ufw allow 80/tcp
ufw allow 443/tcp
ufw allow 3389/tcp
ufw allow 5900/tcp
# 重载防火墙
ufw reload
# 验证所有开放端口
ufw status
# 创建安装目录
mkdir -p /opt/hfish
cd /opt/hfish
# 下载最新稳定版（v3.3.5）
wget https://hfish.net/download/hfish-3.3.5-linux-amd64.tgz
# 验证文件完整性（可选但推荐）
wget https://hfish.net/download/hfish-3.3.5-linux-amd64.tgz.sha256
sha256sum -c hfish-3.3.5-linux-amd64.tgz.sha256
# 解压安装包
tar zxvf hfish-3.3.5-linux-amd64.tgz
# 进入解压后的目录
cd hfish-3.3.5-linux-amd64
# 赋予执行权限
chmod +x server node
# 创建systemd服务文件
cat > /etc/systemd/system/hfish.service << EOF
[Unit]
Description=HFish蜜罐服务
After=network.target syslog.target

[Service]
Type=simple
User=root
Group=root
WorkingDirectory=/opt/hfish/hfish-3.3.5-linux-amd64
ExecStart=/opt/hfish/hfish-3.3.5-linux-amd64/server
Restart=always
RestartSec=5
LimitNOFILE=65536
LimitNPROC=65536
StandardOutput=journal+console
StandardError=journal+console

[Install]
WantedBy=multi-user.target
EOF
# 重新加载systemd配置
systemctl daemon-reload
# 启用开机自启
systemctl enable hfish
# 启动HFish服务
systemctl start hfish
# 查看服务状态
systemctl status hfish
# 查看启动日志（排查问题用）
journalctl -u hfish -f
netstat -tulpn | grep -E '4433|4434'
docker rm -f hfish
echo "<<<验证蜜罐服务是否正常运行>>>"
# 查看所有监听端口
netstat -tulpn | grep server
sh -c "$(curl -k https://192.168.1.100:4434/tmp/abcdef123456.sh)"
# 备份整个HFish目录（二进制部署）
tar zcvf hfish-backup-$(date +%Y%m%d).tar.gz /opt/hfish

# 备份Docker数据卷
tar zcvf hfish-docker-backup-$(date +%Y%m%d).tar.gz /opt/hfish/data
iptables -t nat -A PREROUTING -p tcp --dport 22 -j REDIRECT --to-port 2222
# 重载iptables规则
iptables -t nat -F
iptables -t nat -X
iptables -t nat -C PREROUTING
# 启动服务
systemctl start hfish

# 停止服务
systemctl stop hfish

# 重启服务
systemctl restart hfish

# 查看服务状态
systemctl status hfish

# 查看启动日志
journalctl -u hfish -f

# 查看最近100行日志
journalctl -u hfish -n 100

