# Docker 引擎全部主流版本（从 20.10 开始，包含所有主要发行版）
DOCKER_VERSION="24.0.5"              # 默认安装版本（原有两个定义，合并）
DOCKER_VERSIONS="20.10.9,20.10.24,23.0.6,24.0.9,25.0.5,26.1.4,27.3.1,28.0.1"
echo "<<<安装 Docker（如未安装）>>>"
# CentOS/RHEL/Rocky Linux
yum install -y docker-ce docker-ce-cli containerd.io
systemctl start docker
systemctl enable docker
# Ubuntu/Debian
apt install -y docker.io
systemctl start docker
systemctl enable docker
# 创建数据持久化目录
mkdir -p /opt/hfish/data
# 拉取最新官方镜像
docker pull threatbook/hfish-server:latest
# 启动容器
docker run -d \
  --name hfish \
  --restart always \
  --network host \
  --privileged=true \
  -v /opt/hfish/data:/usr/share/hfish \
  -v /etc/localtime:/etc/localtime:ro \
  threatbook/hfish-server:latest
# 查看容器运行状态
docker ps
# 查看容器日志
docker logs -f hfish
# 重启容器
docker restart hfish
# 停止容器
docker stop hfish
# 删除容器
#没有网怎么离线安装docker-26.1.4.tgz和docker-28.0.1.tgz{增加配置docker，增加配置源}命令
#创建 systemd 服务文件
# 第一步：创建 Docker 用户组并启动服务
# 创建 docker 用户组（如果不存在的话）
cp -p /root/LinuxEnvConfig/docker-compose /etc/systemd/system/docker-compose
sudo groupadd docker 2>/dev/null || true
# 创建 Docker 守护进程的 systemd service 文件
# ExecStart：dockerd 是 Docker 守护进程的二进制名称
# Restart=always：异常退出时自动重启
# LimitNOFILE：调大文件描述符上限，容器多的时候需要
sudo tee /etc/systemd/system/docker.service > /dev/null <<EOF
[Unit]
Description=Docker Application Container Engine
Documentation=https://docs.docker.com
After=network-online.target firewalld.service containerd.service
Wants=network-online.target
Requires=docker.socket containerd.service

[Service]
Type=notify
ExecStart=/usr/bin/dockerd -H fd:// --containerd=/run/containerd/containerd.sock
ExecReload=/bin/kill -s HUP \$MAINPID
TimeoutStartSec=0
RestartSec=2
Restart=always
StartLimitBurst=3
StartLimitInterval=60s
LimitNOFILE=infinity
LimitNPROC=infinity
LimitCORE=infinity
TasksMax=infinity
Delegate=yes
KillMode=process
OOMScoreAdjust=-500

[Install]
WantedBy=multi-user.target
EOF

# 创建 Docker Socket 文件（Docker CLI 通过 socket 与 dockerd 通信）
sudo tee /etc/systemd/system/docker.socket > /dev/null <<EOF
[Unit]
Description=Docker Socket for the API

[Socket]
ListenStream=/var/run/docker.sock
SocketMode=0660
SocketUser=root
SocketGroup=docker

[Install]
WantedBy=sockets.target
EOF
第五步：创建 docker 用户组并启动服务
# 创建 docker 用户组（如果不存在的话）
sudo groupadd docker 2>/dev/null || true

# 重新加载 systemd 配置（每次修改 service 文件后都要执行）
sudo systemctl daemon-reload

# 启动 containerd（Docker 依赖它作为底层运行时）
sudo systemctl enable --now containerd

# 启动 Docker 并设置开机自启
sudo systemctl enable --now docker

# 检查服务状态
sudo systemctl status docker
