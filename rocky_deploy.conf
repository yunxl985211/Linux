# RockyLinux自动化部署配置文件

# 系统配置
SUPPORTED_VERSIONS="8,9,10"  # 支持的RockyLinux版本

# HTTP服务配置
HTTP_VERSION="2.4.57"      # Apache版本

# DNS服务配置
DNS_VERSION="9.16.23"      # BIND版本

# 数据库配置
DB_TYPE="mysql"            # 数据库类型: mysql, mariadb, postgresql
DB_VERSION="8.0"           # 数据库版本
DB_USER="admin"            # 数据库管理员用户名
# DB_PASSWORD 会在脚本中自动生成

# 中间件配置
MIDDLEWARE_TYPE="tomcat"   # 中间件类型: tomcat, nginx, redis
MIDDLEWARE_VERSION="9.0.75" # 中间件版本

# Docker配置
DOCKER_VERSION="28.0.1"
DOCKER_VERSION="24.0.5"    # Docker版本

# 编程语言配置
PHP_VERSION="5.5"# PHP版本
PHP_VERSION="5.6"
PHP_VERSION="5.7"
PHP_VERSION="7.0"
PHP_VERSION="7.1"
PHP_VERSION="7.2"
PHP_VERSION="7.3"
PHP_VERSION="7.4"
PHPPHP_VERSION="7.4.34"
PHP_VERSION="8.0"
PHPPHP_VERSION="8.0.34"
PHPPHP_VERSION="8.1.34"
PHP_VERSION="8.2"
PHPPHP_VERSION="8.2.34"
PHP_VERSION="8.3"
PHPPHP_VERSION="8.3.34"
PHP_VERSION="8.1"
JVM_VERSION="8"
JAVA_VERSION="11"          # Java版本
PYTHON_VERSION="3.9"       # Python版本

# WAF配置
WAF_TYPE="modsecurity"     # WAF类型
WAF_VERSION="3.0.8"        # WAF版本

# 日志配置
LOG_FILE="/var/log/rocky_deploy.log"
LOG_LEVEL="INFO"           # 日志级别: DEBUG, INFO, WARNING, ERROR

# 备份配置
BACKUP_DIR="/backup"
AUTO_BACKUP="true"         # 自动备份标志
FORCE_BACKUP="false"       # 强制备份标志，true表示即使有备份也会重新备份

# 网络配置
DNS_DOMAIN=""              # 默认DNS域名
DNS_IP=""                  # 默认DNS IP地址

# 安全配置
FIREWALL_ENABLE="true"     # 防火墙启用标志
SELINUX_MODE="permissive"  # SELinux模式: enforcing, permissive, disabled